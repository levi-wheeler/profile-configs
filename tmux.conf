set -g default-shell "/bin/bash"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# Keep window and pane numbering 1-based.

# tmux 2.1+ uses the single mouse option instead of the older mouse-* options.
set -g mouse on
setw -g automatic-rename off
setw -g allow-rename off
setw -g monitor-activity on
set -g window-status-format '#I #{?pane_title,#{pane_title},#{window_name}}'
set -g window-status-current-format '#I #{?pane_title,#{pane_title},#{window_name}}'

# Primary prefix on C-a, with C-b kept as a fallback.
unbind-key C-b
set -g prefix C-a
set -g prefix2 C-b
bind-key C-a send-prefix
bind-key C-b send-prefix -2

unbind-key '"'
unbind-key %
unbind-key c
unbind-key C
unbind-key G
unbind-key P
bind-key w choose-tree -Zw
bind-key c run-shell -b 'PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh"'
bind-key -n F1 run-shell -b 'tmux select-window -t 1 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 1; }'
bind-key -n F2 run-shell -b 'tmux select-window -t 2 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 2; }'
bind-key -n F3 run-shell -b 'tmux select-window -t 3 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 3; }'
bind-key -n F4 run-shell -b 'tmux select-window -t 4 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 4; }'
bind-key -n F5 run-shell -b 'tmux select-window -t 5 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 5; }'
bind-key -n F6 run-shell -b 'tmux select-window -t 6 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 6; }'
bind-key -n F7 run-shell -b 'tmux select-window -t 7 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 7; }'
bind-key -n F8 run-shell -b 'tmux select-window -t 8 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 8; }'
bind-key -n F9 run-shell -b 'tmux select-window -t 9 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 9; }'
bind-key -n F10 run-shell -b 'tmux select-window -t 10 2>/dev/null || { PROFILE_CONFIGS_DIR="${PROFILE_CONFIGS_DIR:-$HOME/.config/profile-configs}"; "$PROFILE_CONFIGS_DIR/scripts/new-window-launcher.sh" --target 10; }'
bind-key | split-window -h
bind-key - split-window -v

bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
